support_ticket_rag:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('SUPABASE_POOLER_HOST') }}"
      user: "{{ env_var('SUPABASE_POOLER_USER') }}"
      password: "{{ env_var('SUPABASE_DB_PASSWORD') }}"
      port: 6543
      dbname: postgres
      schema: public
      threads: 1
      sslmode: require
